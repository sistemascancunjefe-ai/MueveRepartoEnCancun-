<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#060A0E"/>

  <!-- Speed lines (left) -->
  <line x1="8"  y1="52" x2="26" y2="52" stroke="#00E8A2" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <line x1="4"  y1="64" x2="24" y2="64" stroke="#00E8A2" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="8"  y1="76" x2="26" y2="76" stroke="#00E8A2" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Package body — top face -->
  <polygon points="64,18 102,38 102,74 64,54" fill="#00E8A2" opacity="0.95"/>
  <!-- Package body — left face -->
  <polygon points="26,38 64,18 64,54 26,74" fill="#00C98A"/>
  <!-- Package body — bottom face -->
  <polygon points="26,74 64,54 102,74 64,94" fill="#007A5E"/>

  <!-- Ribbon vertical -->
  <line x1="64" y1="18" x2="64" y2="94" stroke="#060A0E" stroke-width="3.5" opacity="0.4"/>
  <!-- Ribbon horizontal -->
  <line x1="26" y1="56" x2="102" y2="56" stroke="#060A0E" stroke-width="3" opacity="0.3"/>

  <!-- Bow knot top -->
  <circle cx="64" cy="18" r="5" fill="#F0F6FC" opacity="0.9"/>

  <!-- "MR" subtle text -->
  <text x="64" y="113" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="900"
        text-anchor="middle" fill="#00E8A2" letter-spacing="2" opacity="0.8">MR</text>
</svg>
