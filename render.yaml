version: "1"
services:
  - type: web
    name: mueve-reparto-frontend
    runtime: node
    repo: https://github.com/sistemascancunjefe-ai/MueveRepartoEnCancun-
    branch: main
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: node ./dist/server/entry.mjs
    envVars:
      - key: NODE_VERSION
        value: "20.10.0"
      - key: NODE_ENV
        value: production
      - key: PUBLIC_API_URL
        fromService:
          name: mueve-reparto-api
          type: web
          property: url
      - key: PUBLIC_PLAN_FREE_LIMIT
        value: "20"
      - key: PUBLIC_PRO_PRICE_MXN
        value: "99"
      # Stripe — clave pública (segura en frontend)
      - key: PUBLIC_STRIPE_PUBLISHABLE_KEY
        value: pk_live_51T6oKE2dM2f4HRxoh2mpjFg4MHpHXxqc65ulAos4p22xPpD3v55ejGpiGx1Y8vdK5doYMTPGvTPi6RzsqdVv2xvE000caSvFag
      - key: PUBLIC_STRIPE_BUY_BUTTON_ID
        value: buy_btn_1T9Y4E2dM2f4HRxoylh2M7Z4
      # Stripe — clave secreta (solo servidor, NO en PUBLIC_)
      # Añadir manualmente en Render Dashboard → Environment → STRIPE_SECRET_KEY
      - key: STRIPE_SECRET_KEY
        sync: false
    autoDeploy: true

  - type: web
    name: mueve-reparto-api
    runtime: rust
    repo: https://github.com/sistemascancunjefe-ai/MueveRepartoEnCancun-
    branch: main
    rootDir: backend
    buildCommand: cargo build --release
    startCommand: ./target/release/mueve-reparto-api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mueve-reparto-db
          property: connectionString
      - key: PORT
        value: "8080"
      - key: RUST_LOG
        value: info
      - key: ALLOWED_ORIGINS
        value: https://mueverepartoencancun.onrender.com
      - key: FRONTEND_URL
        value: https://mueverepartoencancun.onrender.com
      - key: JWT_SECRET
        generateValue: true
      # Resend.com — gratis 3,000 emails/mes
      # Crear en: https://resend.com/api-keys
      - key: RESEND_API_KEY
        sync: false
    autoDeploy: true

databases:
  - name: mueve-reparto-db
    databaseName: mueve_reparto
    user: reparto_user
    plan: free
