name: Delegate to Claude (unscoped tasks)

on:
  workflow_dispatch:
    inputs:
      instructions:
        description: "Tarea o contexto para delegar a Claude (dejar vacío para que Claude planifique)."
        required: false
        type: string

concurrency:
  group: claude-delegation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-delegation:
    name: Enviar trabajo no planeado a Claude
    runs-on: ubuntu-latest
    # Solo en ramas de trabajo, nunca en main
    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar instrucciones
        id: prepare
        run: |
          INPUT="${{ github.event.inputs.instructions }}"
          if [ -z "$INPUT" ]; then
            INPUT="No se proporcionó input. Genera un plan mínimo para Mueve Reparto y propón cambios vía PR contra la rama actual. No hacer push directo a ramas protegidas. Lee CLAUDE.md y AGENTS.md para contexto del proyecto."
          fi
          INPUT=$(printf "%s" "$INPUT" | tr -d '\r')
          if [ ${#INPUT} -gt 4000 ]; then
            INPUT="${INPUT:0:4000}"
          fi
          echo "prepared_instructions<<'EOF'" >> "$GITHUB_OUTPUT"
          echo "$INPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Claude Code — Planificar y aplicar cambios
        uses: anthropics/claude-code-base-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          instructions: |
            Proyecto: Mueve Reparto (PWA delivery para repartidores independientes en Cancún).
            Lee CLAUDE.md y AGENTS.md para contexto completo antes de actuar.
            Planifica los cambios, luego apllícalos o propón via PR — nunca push directo a ramas protegidas.

            Tarea del usuario: ${{ steps.prepare.outputs.prepared_instructions }}
